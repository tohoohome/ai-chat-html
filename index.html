<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <title>Gemini AI Chat</title>
      <style>
          body {
                font-family: Arial;
                      max-width: 600px;
                            margin: auto;
                                  padding: 20px;
                                      }
                                          textarea {
                                                width: 100%;
                                                      height: 100px;
                                                          }
                                                              button {
                                                                    padding: 10px;
                                                                          margin-top: 10px;
                                                                                cursor: pointer;
                                                                                    }
                                                                                        #response {
                                                                                              margin-top: 20px;
                                                                                                    white-space: pre-wrap;
                                                                                                          background: #f4f4f4;
                                                                                                                padding: 10px;
                                                                                                                    }
                                                                                                                      </style>
                                                                                                                      </head>
                                                                                                                      <body>

                                                                                                                        <h2>AI Chat (Render + Gemini)</h2>

                                                                                                                          <textarea id="prompt" placeholder="Type your message..."></textarea>
                                                                                                                            <br/>
                                                                                                                              <button onclick="send()">Send</button>

                                                                                                                                <div id="response"></div>

                                                                                                                                  <script>
                                                                                                                                      async function send() {
                                                                                                                                            const prompt = document.getElementById("prompt").value;
                                                                                                                                                  const resBox = document.getElementById("response");

                                                                                                                                                        resBox.innerText = "Loading...";

                                                                                                                                                              try {
                                                                                                                                                                      const res = await fetch("https://my-next-app-vtez.onrender.com/api/ai", {
                                                                                                                                                                                method: "POST",
                                                                                                                                                                                          headers: {
                                                                                                                                                                                                      "Content-Type": "application/json"
                                                                                                                                                                                                                },
                                                                                                                                                                                                                          body: JSON.stringify({
                                                                                                                                                                                                                                      userId: "github-user-1",
                                                                                                                                                                                                                                                  prompt: prompt
                                                                                                                                                                                                                                                            })
                                                                                                                                                                                                                                                                    });

                                                                                                                                                                                                                                                                            const data = await res.json();

                                                                                                                                                                                                                                                                                    resBox.innerText = data.reply || data.error || "No response";

                                                                                                                                                                                                                                                                                          } catch (err) {
                                                                                                                                                                                                                                                                                                  resBox.innerText = "Error: " + err.message;
                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                              </script>

                                                                                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                                                                                              </html>
